version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pr_synthesizer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"  
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pr-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pr-network

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pr_synthesizer
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5000
      SECURITY_AGENT_URL: http://security-agent:5001
      DATABASE_AGENT_URL: http://database-agent:5002
      PERFORMANCE_AGENT_URL: http://performance-agent:5003
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pr-network

  security-agent:
    build: ./agents/security
    ports:
      - "5001:5001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: 5001
    networks:
      - pr-network

  database-agent:
    build: ./agents/database
    ports:
      - "5002:5002"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: 5002
    networks:
      - pr-network

  performance-agent:
   build: ./agents/performance
   ports:
     - "5003:5003"
   environment:
     GEMINI_API_KEY: ${GEMINI_API_KEY}
     OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
     PORT: 5003
   networks:
     - pr-network

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://server:5000  
    depends_on:
      - server
    networks:
      - pr-network

networks:
  pr-network:
    driver: bridge

volumes:
  postgres_data: